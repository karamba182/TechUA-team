- name: Deploy backend app
  hosts: backend
  become: yes

  vars_files:
    - var.yml

  tasks:
    - name: Ensure required packages are installed
      apt:
        name:
          - git
          - maven
          - tomcat9
          - openjdk-17-jdk
        state: present
        update_cache: yes

    - name: Clone backend repository
      git:
        repo: "{{ backend_repo }}"
        dest: "{{ backend_dest }}"
        version: "{{ backend_version }}"
        force: yes

