    - name: Install Tomcat
      apt:
        name: tomcat9
        state: present
        update_cache: yes

    # - name: Build backend with Maven
    #   shell: mvn clean package -DskipTests
    #   args:
    #     chdir: "{{ backend_dest }}"

    - name: Rsync WAR from build server to backend VM
      synchronize:
      src: yurii@local-build-server:/path/to/dev.war
      dest: /var/lib/tomcat9/webapps/dev.war
      mode: push
      rsync_path: "sudo rsync"

    - name: Copy dev.war to Tomcat webapps
      copy:
        src: "{{ backend_dest }}/target/dev.war"
        dest: /var/lib/tomcat9/webapps/dev.war
        remote_src: yes
        owner: tomcat
        group: tomcat
        mode: 0644

    - name: Restart Tomcat
      systemd:
        name: tomcat9
        state: restarted

    - name: Start backend app
      shell: |
        nohup java -jar target/dev.war > /var/log/backend.log 2>&1 &
      args:
        chdir: "{{ backend_dest }}"